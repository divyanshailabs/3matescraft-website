<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

#loginBox {
  max-width: 300px;
  margin: 100px auto;
  background: #1f2937;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

#loginBtn {
  background: #22c55e;
  color: black;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.accept {
  background: green;
  color: white;
  margin-right: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.reject {
  background: red;
  color: white;
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Admin Panel</h1>

<!-- LOGIN SCREEN -->
<div id="loginBox">
  <h3>Enter Admin Password</h3>
  <input type="password" id="pass" placeholder="Password">
  <button id="loginBtn" onclick="checkPass()">Login</button>
</div>

<!-- ADMIN CONTENT -->
<div id="apps" style="display:none;">Loading...</div>

<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAofirNVMReX1mrdGFXUaf4qxjjVU4mE4",
  authDomain: "matescraft-a441d.firebaseapp.com",
  projectId: "matescraft-a441d"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

// PASSWORD CHECK
window.checkPass = function () {

  let input = document.getElementById("pass").value;

  if (input === "3Matescraft_Pass07") {

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("apps").style.display = "block";

    loadApplications();

  } else {
    alert("Wrong password!");
  }
};

// LOAD APPLICATIONS
async function loadApplications() {
  const container = document.getElementById("apps");

  const snapshot = await getDocs(collection(db, "applications"));

  container.innerHTML = "";

  snapshot.forEach(d => {
    let data = d.data();

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${data.ign || "No IGN"}</h3>
      <p>Type: ${data.type || "N/A"}</p>
      <p>Status: <b>${data.status || "pending"}</b></p>

      <button class="accept" data-id="${d.id}">Accept</button>
      <button class="reject" data-id="${d.id}">Reject</button>
    `;

    container.appendChild(div);
  });
}

// BUTTON ACTIONS
document.addEventListener("click", async (e) => {

  if (e.target.classList.contains("accept")) {
    await updateDoc(doc(db, "applications", e.target.dataset.id), {
      status: "accepted"
    });
    loadApplications();
  }

  if (e.target.classList.contains("reject")) {
    await updateDoc(doc(db, "applications", e.target.dataset.id), {
      status: "rejected"
    });
    loadApplications();
  }

});

</script>

</body>
</html>
