<!DOCTYPE html>

<html>
<head>
<script type="module" src="auth.js"></script>
<title>Status</title>
</head>

<body style="background:#020617;color:white;text-align:center;">

<h1>Status</h1>
<div id="status"></div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=getApps().length?getApps()[0]:initializeApp({
apiKey: "AIzaSyAofirNVMReXq1mrdGFXUaf4qxjjVU4mE4",
authDomain: "matescraft-a441d.firebaseapp.com",
projectId: "matescraft-a441d"});

const auth=getAuth(app);
const db=getFirestore(app);

onAuthStateChanged(auth,async user=>{
let q=query(collection(db,"applications"),where("uid","==",user.uid));
let snap=await getDocs(q);

snap.forEach(d=>{
let data=d.data();
status.innerHTML=`${data.status}`;
});
});
</script>

</body>
</html>
