<style>
body{
  margin:0;
  font-family:Poppins;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* Particles */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* Navbar */
.nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:center;
  padding:15px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.4);
}

.nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:700;
  position:relative;
  transition:0.3s;
}

/* Hover glow */
.nav a:hover{
  color:#22c55e;
  text-shadow:0 0 10px #22c55e;
}

/* UNDERLINE ANIMATION */
.nav a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  left:0;
  bottom:-5px;
  background:#22c55e;
  transition:0.3s;
}

.nav a:hover::after{
  width:100%;
}

/* Container */
.container{
  margin-top:100px;
  text-align:center;
  padding:20px;
}

/* ANIMATION */
@keyframes riseFade{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* Heading */
h1{
  opacity:0;
  animation:riseFade 1s ease forwards;
}

/* Section headings */
.section-title{
  margin-top:40px;
  font-size:28px;
  text-shadow:0 0 10px #22c55e;
  opacity:0;
  animation:riseFade 1s ease forwards;
}

/* STAGGER TITLES */
.section-title:nth-of-type(1){animation-delay:0.2s;}
.section-title:nth-of-type(2){animation-delay:0.4s;}
.section-title:nth-of-type(3){animation-delay:0.6s;}

/* Cards wrapper */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:20px;
}

/* Card */
.card{
  background:rgba(15,23,42,0.6);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  width:220px;
  transition:0.4s;
  opacity:0;
  animation:riseFade 1s ease forwards;
}

/* STAGGER CARDS */
.cards .card:nth-child(1){animation-delay:0.3s;}
.cards .card:nth-child(2){animation-delay:0.5s;}
.cards .card:nth-child(3){animation-delay:0.7s;}
.cards .card:nth-child(4){animation-delay:0.9s;}

.card:hover{
  transform:translateY(-12px) scale(1.05);
  box-shadow:0 0 25px #22c55e;
}

/* Avatar */
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:10px;
  border:3px solid #22c55e;
}

/* Role colors */
.owner { color:#facc15; }
.admin { color:#ef4444; }
.mod { color:#3b82f6; }

/* Name */
.name{
  font-size:15px;
  margin-top:5px;
  color:#cbd5f5;
}

/* Footer */
footer{
  margin-top:50px;
  text-align:center;
  color:gray;
  padding:20px;
}

<script>
// PARTICLES (UNCHANGED)
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
speed:Math.random()*0.7+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y+=p.speed;
if(p.y>canvas.height)p.y=0;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#22c55e";
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
</script>
